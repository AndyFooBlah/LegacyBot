<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- LegacyBot logo — Retro striped sunset with audio waveform horizon -->
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <clipPath id="sunClip">
      <circle cx="64" cy="72" r="36"/>
    </clipPath>
    <clipPath id="horizon">
      <rect x="0" y="0" width="128" height="72"/>
    </clipPath>
  </defs>

  <!-- Sky background circle -->
  <circle cx="64" cy="64" r="60" fill="#1e1b4b" opacity="0.08"/>

  <!-- Sun (upper half only) -->
  <g clip-path="url(#horizon)">
    <circle cx="64" cy="72" r="36" fill="url(#sun)"/>
    <!-- Retro stripes -->
    <g clip-path="url(#sunClip)">
      <rect x="0" y="42" width="128" height="3" fill="white" opacity="0.95"/>
      <rect x="0" y="50" width="128" height="3.5" fill="white" opacity="0.9"/>
      <rect x="0" y="58" width="128" height="4" fill="white" opacity="0.85"/>
      <rect x="0" y="66" width="128" height="5" fill="white" opacity="0.8"/>
    </g>
  </g>

  <!-- Horizon line -->
  <line x1="16" y1="72" x2="112" y2="72" stroke="#4338ca" stroke-width="2" stroke-linecap="round"/>

  <!-- Audio waveform below horizon -->
  <g stroke="#6366f1" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6">
    <line x1="20" y1="80" x2="20" y2="84"/>
    <line x1="26" y1="78" x2="26" y2="86"/>
    <line x1="32" y1="76" x2="32" y2="88"/>
    <line x1="38" y1="79" x2="38" y2="85"/>
    <line x1="44" y1="77" x2="44" y2="87"/>
    <line x1="50" y1="80" x2="50" y2="84"/>
    <line x1="56" y1="78" x2="56" y2="86"/>
    <line x1="62" y1="75" x2="62" y2="89"/>
    <line x1="68" y1="78" x2="68" y2="86"/>
    <line x1="74" y1="80" x2="74" y2="84"/>
    <line x1="80" y1="77" x2="80" y2="87"/>
    <line x1="86" y1="79" x2="86" y2="85"/>
    <line x1="92" y1="76" x2="92" y2="88"/>
    <line x1="98" y1="78" x2="98" y2="86"/>
    <line x1="104" y1="80" x2="104" y2="84"/>
    <line x1="110" y1="81" x2="110" y2="83"/>
  </g>

  <!-- Text -->
  <text x="64" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#334155" letter-spacing="0.5">
    LEGACYBOT
  </text>
</svg>
