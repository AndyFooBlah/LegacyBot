name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# @andyfooblah/voice-common and @andyfooblah/knowledge-common install from
# npmjs.org like any other dependency — no sibling checkouts or PEER_REPO_TOKEN.
jobs:
  test:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build (includes bundle secret scan)
        run: npm run build
